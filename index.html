<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>NUVIO Browser</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #888;
      --accent: #ff5c35;
      --accent2: #ff8c42;
      --nav-active: #4f7fff;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .phone-frame {
      width: 100%;
      max-width: 420px;
      height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    /* STATUS BAR */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px 6px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--text);
      flex-shrink: 0;
    }
    .status-left { font-weight: 700; letter-spacing: 0.03em; }
    .status-right { display: flex; align-items: center; gap: 6px; font-size: 10px; }
    .battery {
      background: #444;
      border-radius: 3px;
      width: 26px;
      height: 13px;
      position: relative;
      display: flex;
      align-items: center;
      padding: 2px;
    }
    .battery::after {
      content: '';
      position: absolute;
      right: -4px;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 6px;
      background: #444;
      border-radius: 0 2px 2px 0;
    }
    .battery-fill {
      background: #4caf50;
      border-radius: 2px;
      height: 100%;
      width: 90%;
    }

    /* CLEAN BANNER */
    .clean-banner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 6px 16px 12px;
      padding: 10px 14px;
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      flex-shrink: 0;
      animation: fadeSlideDown 0.4s ease both;
    }
    .clean-banner span {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
    }
    .clean-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 6px 18px;
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 3px 14px rgba(255,92,53,0.4);
    }
    .clean-btn:active { transform: scale(0.95); }

    /* MAIN SCROLL AREA */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: 10px;
      scrollbar-width: none;
    }
    .scroll-area::-webkit-scrollbar { display: none; }

    /* LOGO */
    .logo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 0 28px;
      animation: fadeSlideDown 0.5s ease 0.1s both;
    }
    .logo-wrapper {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo-icon {
      width: 58px;
      height: 58px;
      background: linear-gradient(135deg, #1c1c2e, #2a2a4a);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(79,127,255,0.25), inset 0 1px 0 rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
    }
    .logo-icon::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(79,127,255,0.15), transparent);
    }
    .logo-n {
      font-family: 'Nunito', sans-serif;
      font-size: 32px;
      font-weight: 900;
      background: linear-gradient(135deg, #4f7fff, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      z-index: 1;
    }
    .logo-text {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: -1px;
      color: var(--text);
    }

    /* SEARCH BAR */
    .search-section {
      padding: 0 16px 24px;
      animation: fadeSlideDown 0.5s ease 0.2s both;
    }
    .search-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 13px 16px;
      cursor: text;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-bar:focus-within {
      border-color: var(--nav-active);
      box-shadow: 0 0 0 3px rgba(79,127,255,0.12);
    }
    .search-g {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 16px;
      background: linear-gradient(135deg, #4285F4, #EA4335, #FBBC05, #34A853);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .search-bar input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      color: var(--muted);
      font-weight: 600;
    }
    .search-bar input::placeholder { color: var(--muted); }
    .ai-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      background: #1e1e2e;
      border: 1px solid #3a3a5a;
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 700;
      color: #a78bfa;
      letter-spacing: 0.05em;
    }
    .ai-star { font-size: 10px; }

    /* SHORTCUTS GRID */
    .shortcuts-section {
      padding: 0 16px;
      animation: fadeSlideDown 0.5s ease 0.3s both;
    }
    .shortcuts-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px 8px;
    }
    .shortcut-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      cursor: pointer;
    }
    .shortcut-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 900;
      transition: transform 0.15s, box-shadow 0.15s;
      flex-shrink: 0;
    }
    .shortcut-item:active .shortcut-icon { transform: scale(0.92); }
    .shortcut-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 60px;
    }

    /* Icon colors */
    .ic-google { background: #fff; }
    .ic-youtube { background: #ff0000; }
    .ic-facebook { background: #1877f2; }
    .ic-wescore { background: #00a651; }
    .ic-betking { background: #0a1560; }
    .ic-betpawa { background: #6abf1e; }
    .ic-afropari { background: #1a6e2e; }
    .ic-bet9ja { background: #1a6e2e; }
    .ic-1xbet { background: #003087; }
    .ic-more {
      background: radial-gradient(circle, #1a1a2e 60%, #2a2a3a);
      border: 1.5px solid var(--border);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 10px;
    }
    .more-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    /* SVG icons */
    .shortcut-icon svg { width: 26px; height: 26px; }

    /* BOTTOM NAV */
    .bottom-nav {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 10px 0 14px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      position: relative;
      min-width: 56px;
    }
    .nav-icon {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      position: relative;
    }
    .nav-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
    }
    .nav-item.active .nav-icon { color: var(--nav-active); }
    .nav-item.active .nav-label { color: var(--nav-active); }
    .nav-home-icon {
      width: 32px;
      height: 32px;
      background: var(--nav-active);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .badge {
      position: absolute;
      top: -4px;
      right: -8px;
      background: var(--accent);
      color: #fff;
      font-size: 8px;
      font-weight: 800;
      border-radius: 20px;
      padding: 1px 5px;
      min-width: 18px;
      text-align: center;
    }
    .tabs-box {
      width: 22px;
      height: 22px;
      border: 2.5px solid var(--muted);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 800;
      color: var(--muted);
    }

    /* SYSTEM NAR */
    .system-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 40px;
      padding: 8px 0 10px;
      background: var(--bg);
      flex-shrink: 0;
    }
    .sys-btn {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.7;
      cursor: pointer;
    }

    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

</div>
<script>
  function handleSearch(e) {
    if (e.key === 'Enter') {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) return;
      const isURL = /^(https?:\/\/|www\.)\S+/.test(query);
      const url = isURL
        ? (query.startsWith('http') ? query : 'https://' + query)
        : 'https://www.google.com/search?q=' + encodeURIComponent(query);
      window.open(url, '_blank');
    }
  }

  document.querySelector('.search-bar').addEventListener('click', function() {
    document.getElementById('searchInput').focus();
  });

  document.querySelectorAll('.shortcut-item').forEach(item => {
    item.addEventListener('click', function() {
      const label = this.querySelector('.shortcut-label').textContent.trim();
      const urls = {
        'Google': 'https://www.google.com',
        'YouTube': 'https://www.youtube.com',
        'Facebook': 'https://www.facebook.com',
        'WeScore': 'https://www.wescore.com',
        'BetKing': 'https://www.betking.com',
        'betPawa': 'https://www.betpawa.com',
        'Afropari': 'https://www.afropari.com',
        'Bet9ja': 'https://www.bet9ja.com',
