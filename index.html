<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUVIO</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Exo 2', sans-serif;
  }

  .logo-section {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 48px;
  }

  .logo-icon {
    width: 72px;
    height: 72px;
    background: linear-gradient(145deg, #1e1e3a, #2a2a50);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 30px rgba(100, 100, 255, 0.25);
  }

  .logo-icon span {
    font-size: 32px;
    font-weight: 800;
    color: #8888ff;
    letter-spacing: -1px;
  }

  .logo-text {
    font-size: 48px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .search-bar {
    width: 90%;
    max-width: 420px;
    background: #1c1c1c;
    border-radius: 30px;
    display: flex;
    align-items: center;
    padding: 14px 16px;
    gap: 10px;
    border: 1px solid #2a2a2a;
  }

  .search-g {
    font-size: 18px;
    font-weight: 700;
    color: #EA4335;
    font-family: serif;
    flex-shrink: 0;
  }

  .search-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #888;
    font-size: 15px;
    font-family: 'Exo 2', sans-serif;
  }

  .search-input::placeholder { color: #666; }

  .ai-btn {
    background: transparent;
    border: 1.5px solid #4a4a7a;
    border-radius: 12px;
    color: #8888cc;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
    transition: border-color 0.2s, color 0.2s;
  }

  .ai-btn:hover { border-color: #8888ff; color: #aaaaff; }

  .ai-btn::before {
    content: '✦';
    font-size: 10px;
    color: #8888cc;
  }
</style>
</head>
<body>

  <div class="logo-section">
    <div class="logo-icon"><span>N</span></div>
    <div class="logo-text">NUVIO</div>
  </div>

  <div class="search-bar">
    <span class="search-g">G</span>
    <input class="search-input" type="text" placeholder="Search or type web address">
    <button class="ai-btn">AI</button>
  </div>

</body>
</html>
